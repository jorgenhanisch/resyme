<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <link rel="stylesheet" href="{{ "css/main.css" | relURL }}">
</head>
<body>
    <header>
        <div class="container">
            <h1><a href="{{ "/" | relURL }}">{{ .Site.Title }}</a></h1>
            
            <nav>
                {{ $url := .Site.Params.sanityUrl }}
                {{ $data := getJSON $url }}
                <ul>
                    {{ range $data.result }}
                    <li>
                        <a href="{{ .slug.current | lower | relURL }}">{{ .title }}</a>
                    </li>
                    {{ end }}
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        {{ block "main" . }}{{ end }}
    </main>

    <footer>
        <div class="container">
            <p>&copy; {{ now.Format "2006" }} {{ .Site.Title }}</p>
        </div>
    </footer>
</body>
</html>
