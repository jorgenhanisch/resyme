<!DOCTYPE html>
<html lang="no">
    <head>
        <meta charset="UTF-8">
        <title>{{ .Title }} | {{ .Site.Title }}</title>
        <link rel="stylesheet" href="/css/main.css">
    </head>
<body>
    <header>
        <nav><a href="/"><strong>{{ .Site.Title }}</strong></a></nav>
    </header>
    
    <main>
        {{ block "main" . }}{{ end }}
    </main>

    <footer>
        <p>&copy; {{ now.Format "2006" }} {{ .Site.Title }}</p>
    </footer>
</body>
</html>
