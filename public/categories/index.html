    <script>
        
        
        
        
        const themeToggleBtn = document.querySelector('.theme-toggle-btn');
        const body = document.body;

        
        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-mode');
        }

        
        themeToggleBtn.addEventListener('click', function() {
            body.classList.toggle('dark-mode');
            
            
            if (body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark');
            } else {
                localStorage.setItem('theme', 'light');
            }
        });

        
        themeToggleBtn.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                themeToggleBtn.click();
            }
        });

        
        
        
        const navLinks = document.querySelectorAll('nav ul li a');
        
        const currentPath = window.location.pathname.replace(/\/$/, "") + "/";

        navLinks.forEach(link => {
            
            const linkPath = new URL(link.href).pathname.replace(/\/$/, "") + "/";

            
            if (currentPath === linkPath) {
                link.classList.add('current');
            } 
            
            
            
            const isHome = currentPath.endsWith('/resyme/') || currentPath === '/';
            const isHomeLink = linkPath.endsWith('/resyme/') || linkPath === '/';

            if (isHome && isHomeLink) {
                link.classList.add('current');
            }
        });

        
        
        

        window.addEventListener('load', function() {
            
            const mainContainer = document.querySelector('main');
            
            
            if (!mainContainer) {
                console.warn("Scriptet fant ingen <main>-tag.");
                return;
            }

            
            const elements = mainContainer.querySelectorAll('h1, h2, h3, p, ul, li');

            elements.forEach(el => {
                
                if (el.closest('.css-info-node') || (el.parentElement && el.parentElement.classList.contains('element-wrapper'))) {
                    return;
                }

                const style = window.getComputedStyle(el);
                
                const data = {
                    'font-size': style.fontSize,
                    'font-family': style.fontFamily.split(',')[0].replace(/"/g, ''),
                    'color': style.color,
                    'font-weight': style.fontWeight,
                    'line-height': style.lineHeight,
                    'display': style.display
                };

                
                const wrapper = document.createElement('div');
                wrapper.className = 'element-wrapper';

                
                el.parentNode.insertBefore(wrapper, el);

                
                const props = ['font-size', 'font-family', 'color', 'font-weight', 'line-height', 'display'];
                
                props.forEach(prop => {
                    const s = document.createElement('span');
                    s.className = `css-tag-${prop} css-info-node`;
                    s.textContent = `${prop}: ${data[prop]}`;
                    
                    
                    wrapper.appendChild(s);
                });

                
                wrapper.appendChild(el);
            });
        });
     </script>
